<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DownTube — ZET Dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ─── Watermark ─── -->
  <div class="watermark">ZET DEV</div>

  <!-- ─── Header ─── -->
  <header class="header">
    <div class="header-inner">
      <div class="header-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="header-brand">ZET Dev</div>
      <h1 class="header-title">DownTube</h1>
      <p class="header-tagline">حمّل فيديوهات يوتيوب مع الترجمة العربية فوراً</p>
    </div>
    <div class="header-wave">
      <svg viewBox="0 0 1440 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,20 C360,55 1080,5 1440,30 L1440,60 L0,60 Z" fill="#040d1a"/>
        <path d="M0,35 C360,60 1080,15 1440,40 L1440,60 L0,60 Z" fill="#0a1628" opacity="0.6"/>
      </svg>
    </div>
  </header>

  <!-- ─── Main Container ─── -->
  <main class="container">

    <!-- ─── Section 1: URL Input ─── -->
    <section id="section-input" class="card">
      <div class="input-row">
        <input type="url" id="url-input" placeholder="الصق رابط يوتيوب هنا..." autocomplete="url" dir="ltr">
        <button id="paste-btn" class="btn-paste" title="لصق من الحافظة" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          </svg>
        </button>
      </div>
      <div style="margin-top:16px;text-align:center;">
        <button id="fetch-btn" class="btn btn-primary ripple btn-full" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/>
          </svg>
          جلب معلومات الفيديو
        </button>
      </div>
    </section>

    <!-- ─── Section 2: Video Info ─── -->
    <section id="section-info" class="card card-hidden">
      <div id="video-thumbnail" class="video-thumbnail"></div>
      <div id="video-title" class="video-title"></div>
      <div id="video-channel" class="video-channel"></div>
      <div class="video-stats">
        <span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> <span id="video-views"></span></span>
      </div>

      <div id="quality-section">
        <label style="font-size:14px;font-weight:600;display:block;margin-bottom:8px;">جودة التحميل</label>
        <div id="quality-selector" class="quality-group"></div>
      </div>

      <div class="subtitle-section">
        <label class="subtitle-toggle">
          <input type="checkbox" id="include-subtitles" checked>
          <span class="subtitle-toggle-track">
            <span class="subtitle-toggle-thumb"></span>
          </span>
          <span class="subtitle-toggle-label">الترجمة العربية</span>
          <span id="subtitle-status" class="subtitle-badge"></span>
        </label>
        <div id="subtitle-options" class="subtitle-options card-hidden">
          <div class="embed-options">
            <label class="embed-option">
              <input type="radio" name="embed-mode" value="separate" checked>
              <div class="embed-option-content">
                <span class="embed-option-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                </span>
                <span class="embed-option-title">ملفين منفصلين</span>
                <span class="embed-option-desc">فيديو + ملف ترجمة SRT</span>
              </div>
            </label>
            <label class="embed-option">
              <input type="radio" name="embed-mode" value="embed">
              <div class="embed-option-content">
                <span class="embed-option-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                </span>
                <span class="embed-option-title">ملف مدمج</span>
                <span class="embed-option-desc">الترجمة محفورة داخل الفيديو</span>
              </div>
            </label>
            <label class="embed-option">
              <input type="radio" name="embed-mode" value="subtitle-only">
              <div class="embed-option-content">
                <span class="embed-option-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                </span>
                <span class="embed-option-title">الترجمة فقط</span>
                <span class="embed-option-desc">بدون تحميل الفيديو</span>
              </div>
            </label>
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button id="download-btn" class="btn btn-primary ripple" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span id="download-btn-text">تحميل الآن</span>
        </button>
        <button id="clear-btn" class="btn btn-outline ripple" type="button" title="مسح">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </section>

    <!-- ─── Section 3: Progress ─── -->
    <section id="section-progress" class="card card-hidden">
      <div class="progress-container">
        <div id="progress-percent" class="progress-percent">0%</div>
        <div class="progress-bar-outer">
          <div id="progress-bar" class="progress-bar-inner" style="width:0%"></div>
        </div>
        <div id="progress-message" class="progress-message">جاري البدء...</div>
        <div class="progress-details">
          <span id="progress-speed"></span>
          <span id="progress-eta"></span>
        </div>
        <div class="progress-actions">
          <button id="cancel-btn" class="btn btn-danger ripple" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            إلغاء
          </button>
          <button id="restart-btn" class="btn btn-secondary ripple" type="button" style="display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            بدء من جديد
          </button>
        </div>
      </div>
    </section>

    <!-- ─── Section 4: Download Ready ─── -->
    <section id="section-result" class="card card-success card-hidden">
      <div class="result-section">
        <div id="result-icon" class="result-icon">✅</div>
        <div id="result-badge" class="result-badge"></div>
        <div id="result-filename" class="result-filename"></div>
        <div id="result-filesize" class="result-filesize"></div>
        <div class="result-buttons">
          <button id="download-video-btn" class="btn btn-success ripple" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            تحميل الملف
          </button>
          <button id="download-subtitle-btn" class="btn btn-secondary ripple" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span id="download-subtitle-text">تحميل الترجمة</span>
          </button>
        </div>
        <div class="result-new-btn">
          <button id="result-restart-btn" class="btn btn-secondary ripple" type="button" style="display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            بدء من جديد
          </button>
          <button id="new-download-btn" class="btn btn-link" type="button">+ تحميل فيديو جديد</button>
        </div>
      </div>
    </section>

    <!-- ─── Error ─── -->
    <section id="section-error" class="card-hidden">
      <div id="error-card" class="error-card">
        <span class="error-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </span>
        <span id="error-message" class="error-message"></span>
      </div>
      <button id="retry-btn" class="btn btn-primary btn-sm ripple" type="button">حاول مرة أخرى</button>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
