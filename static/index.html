<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DownTube — تحميل يوتيوب مع الترجمة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                        accent:  { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' },
                        dark:    { 800: '#172554', 900: '#0a1628', 950: '#040d1a' },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        * { font-family: 'Cairo', sans-serif; }

        /* ── خلفية متحركة مع Blobs ──────────────────── */
        .bg-animated {
            background: linear-gradient(135deg, #0a1628 0%, #172554 40%, #1e3a5f 100%);
            position: relative;
            overflow: hidden;
            min-height: 100vh;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            animation: blobMove 25s ease-in-out infinite alternate;
        }
        .blob-1 { width: 500px; height: 500px; background: #3b82f6; top: -10%; right: -5%; animation-delay: 0s; }
        .blob-2 { width: 400px; height: 400px; background: #0ea5e9; bottom: -5%; left: -5%; animation-delay: -7s; }
        .blob-3 { width: 350px; height: 350px; background: #2563eb; top: 40%; left: 30%; animation-delay: -14s; }

        @keyframes blobMove {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(30px, -50px) scale(1.1); }
            66%  { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* ── جزيئات عائمة مع شعار ZET DEV ──────────── */
        .particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            pointer-events: none;
            animation: particleFloat linear infinite;
        }
        @keyframes particleFloat {
            0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.06; }
            90%  { opacity: 0.06; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
        .watermark-logo {
            color: rgba(96, 165, 250, 0.06);
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 4px;
            position: absolute;
        }
        .watermark-logo:nth-child(odd) {
            color: rgba(56, 189, 248, 0.04);
        }

        /* ── تأثير التوهج (Glow) ──────────────────── */
        .glow-text {
            color: #ffffff;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.6), 0 0 40px rgba(59, 130, 246, 0.4), 0 0 80px rgba(59, 130, 246, 0.2);
        }
        .glow-border {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3), 0 0 30px rgba(59, 130, 246, 0.1), inset 0 0 15px rgba(59, 130, 246, 0.05);
        }
        .glow-btn {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4), 0 0 40px rgba(14, 165, 233, 0.2);
            transition: all 0.3s ease;
        }
        .glow-btn:hover {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.6), 0 0 60px rgba(14, 165, 233, 0.4);
            transform: translateY(-2px);
        }
        .glow-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── شريط التقدم ──────────────────────────── */
        .progress-bar-bg {
            background: rgba(23, 37, 84, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, #3b82f6, #0ea5e9, #3b82f6);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
            transition: width 0.3s ease;
        }
        @keyframes shimmer {
            0%   { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* ── Stepper ──────────────────────────────── */
        .step { transition: all 0.4s ease; }
        .step-active .step-dot {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
            transform: scale(1.3);
        }
        .step-done .step-dot {
            background: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.4);
        }
        .step-dot {
            transition: all 0.4s ease;
        }

        /* ── حركة الظهور ──────────────────────────── */
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── حوار الترجمة ──────────────────────────── */
        .modal-backdrop {
            background: rgba(4, 13, 26, 0.8);
            backdrop-filter: blur(8px);
        }

        /* ── شريط التمرير ──────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 3px; }

        /* ── حقول الإدخال ──────────────────────────── */
        input, select {
            background: rgba(23, 37, 84, 0.6) !important;
            border: 1px solid rgba(59, 130, 246, 0.3) !important;
            color: white !important;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            border-color: rgba(59, 130, 246, 0.8) !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2) !important;
            outline: none;
        }
        input::placeholder { color: rgba(167, 139, 250, 0.4) !important; }
    </style>
</head>
<body class="text-white">

    <!-- خلفية ثابتة مع Blobs وجزيئات -->
    <div class="bg-animated fixed inset-0 -z-10">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="particles" id="particles"></div>
        <div class="watermarks" id="watermarks"></div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="relative z-10 flex flex-col items-center min-h-screen px-4 py-8">

        <!-- الشعار -->
        <div class="text-center mb-8 fade-in">
            <h1 class="text-5xl md:text-7xl font-black glow-text tracking-wider">
                ZET DEV
            </h1>
            <h2 class="text-2xl md:text-3xl font-bold mt-2 text-white/80">
                DownTube
            </h2>
            <p class="text-white/40 mt-1 text-sm">تحميل فيديوهات يوتيوب مع الترجمة العربية</p>
        </div>

        <!-- بطاقة الإدخال -->
        <div class="w-full max-w-xl fade-in" style="animation-delay: 0.2s">
            <div class="rounded-2xl p-6 glow-border" style="background: rgba(15, 10, 46, 0.7); backdrop-filter: blur(20px);">

                <!-- حقل الرابط -->
                <div class="mb-4">
                    <label class="block text-sm text-white/60 mb-2">رابط يوتيوب</label>
                    <input
                        type="text"
                        id="urlInput"
                        dir="ltr"
                        placeholder="https://www.youtube.com/watch?v=..."
                        class="w-full px-4 py-3 rounded-xl text-base"
                    />
                </div>

                <!-- خيارات -->
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm text-white/60 mb-2">لغة الترجمة</label>
                        <select id="langSelect" class="w-full px-4 py-3 rounded-xl text-base">
                            <option value="ar">العربية</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-white/60 mb-2">تحميل الترجمة؟</label>
                        <select id="subtitleSelect" class="w-full px-4 py-3 rounded-xl text-base">
                            <option value="yes">نعم</option>
                            <option value="no">لا</option>
                        </select>
                    </div>
                </div>

                <!-- إعدادات متقدمة -->
                <details class="mb-4">
                    <summary class="text-sm text-white/50 cursor-pointer hover:text-white/80 transition">إعدادات متقدمة</summary>
                    <div class="mt-3 space-y-3">
                        <input type="text" id="cookieInput" placeholder="مسار ملف الكوكيز (اختياري)" dir="ltr" class="w-full px-4 py-2 rounded-xl text-sm" />
                        <input type="text" id="proxyInput" placeholder="عنوان البروكسي (اختياري)" dir="ltr" class="w-full px-4 py-2 rounded-xl text-sm" />
                    </div>
                </details>

                <!-- أزرار -->
                <div class="flex gap-3">
                    <button
                        id="infoBtn"
                        onclick="getVideoInfo()"
                        class="flex-1 py-3 rounded-xl font-bold text-sm bg-white/10 border border-white/20 hover:bg-white/20 transition"
                    >
                        معلومات الفيديو
                    </button>
                    <button
                        id="downloadBtn"
                        onclick="startDownload()"
                        class="flex-1 py-3 rounded-xl font-bold text-sm bg-gradient-to-l from-primary-600 to-accent-600 glow-btn"
                    >
                        تحميل
                    </button>
                    <button
                        id="cancelBtn"
                        onclick="cancelDownload()"
                        disabled
                        class="py-3 px-6 rounded-xl font-bold text-sm bg-red-600/30 border border-red-500/30 hover:bg-red-600/50 transition disabled:opacity-30 disabled:cursor-not-allowed"
                    >
                        إلغاء
                    </button>
                </div>
            </div>
        </div>

        <!-- بطاقة معلومات الفيديو -->
        <div id="infoCard" class="w-full max-w-xl mt-4 hidden fade-in">
            <div class="rounded-2xl p-5 glow-border" style="background: rgba(15, 10, 46, 0.7); backdrop-filter: blur(20px);">
                <div class="flex gap-4">
                    <img id="infoThumb" src="" alt="" class="w-32 h-20 object-cover rounded-lg hidden" />
                    <div class="flex-1 min-w-0">
                        <h3 id="infoTitle" class="font-bold text-white truncate"></h3>
                        <p id="infoDuration" class="text-sm text-white/50 mt-1"></p>
                        <p id="infoSubtitle" class="text-sm mt-1"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- بطاقة التقدم -->
        <div id="progressCard" class="w-full max-w-xl mt-4 hidden fade-in">
            <div class="rounded-2xl p-6 glow-border" style="background: rgba(15, 10, 46, 0.7); backdrop-filter: blur(20px);">

                <!-- Stepper -->
                <div class="flex items-center justify-between mb-6 px-2">
                    <div class="step step-active" data-step="0">
                        <div class="step-dot w-3 h-3 rounded-full bg-white/20"></div>
                        <span class="text-[10px] mt-1 text-white/40 block">جلب المعلومات</span>
                    </div>
                    <div class="flex-1 h-px bg-white/10 mx-1"></div>
                    <div class="step" data-step="1">
                        <div class="step-dot w-3 h-3 rounded-full bg-white/20"></div>
                        <span class="text-[10px] mt-1 text-white/40 block">التحقق</span>
                    </div>
                    <div class="flex-1 h-px bg-white/10 mx-1"></div>
                    <div class="step" data-step="2">
                        <div class="step-dot w-3 h-3 rounded-full bg-white/20"></div>
                        <span class="text-[10px] mt-1 text-white/40 block">الفيديو</span>
                    </div>
                    <div class="flex-1 h-px bg-white/10 mx-1"></div>
                    <div class="step" data-step="3">
                        <div class="step-dot w-3 h-3 rounded-full bg-white/20"></div>
                        <span class="text-[10px] mt-1 text-white/40 block">الترجمة</span>
                    </div>
                    <div class="flex-1 h-px bg-white/10 mx-1"></div>
                    <div class="step" data-step="4">
                        <div class="step-dot w-3 h-3 rounded-full bg-white/20"></div>
                        <span class="text-[10px] mt-1 text-white/40 block">المعالجة</span>
                    </div>
                </div>

                <!-- رسالة المرحلة -->
                <p id="progressMessage" class="text-center text-white/80 text-sm mb-3">جاري التحميل...</p>

                <!-- شريط التقدم -->
                <div class="progress-bar-bg rounded-full h-3 mb-3 overflow-hidden">
                    <div id="progressBarFill" class="progress-bar-fill h-full rounded-full" style="width: 0%"></div>
                </div>

                <!-- إحصائيات -->
                <div class="flex justify-between text-xs text-white/40">
                    <span id="progressPercent">0%</span>
                    <span id="progressSpeed"></span>
                    <span id="progressEta"></span>
                </div>
            </div>
        </div>

        <!-- بطاقة النتيجة -->
        <div id="resultCard" class="w-full max-w-xl mt-4 hidden fade-in">
            <div class="rounded-2xl p-5 glow-border" style="background: rgba(15, 10, 46, 0.7); backdrop-filter: blur(20px);">
                <div id="resultContent"></div>
            </div>
        </div>

        <!-- مودال عدم وجود ترجمة -->
        <div id="subtitleModal" class="fixed inset-0 z-50 hidden items-center justify-center modal-backdrop">
            <div class="rounded-2xl p-6 max-w-sm w-full mx-4 glow-border" style="background: rgba(15, 10, 46, 0.95);">
                <h3 class="text-lg font-bold text-white mb-2">لا توجد ترجمة عربية</h3>
                <p class="text-white/60 text-sm mb-5">لم يتم العثور على ترجمة عربية لهذا الفيديو. ماذا تريد أن تفعل؟</p>
                <div class="flex gap-3">
                    <button onclick="continueWithoutSubtitle()" class="flex-1 py-2 rounded-xl font-bold text-sm bg-gradient-to-l from-primary-600 to-accent-600 glow-btn">
                        تنزيل بدون ترجمة
                    </button>
                    <button onclick="cancelDueToNoSubtitle()" class="flex-1 py-2 rounded-xl font-bold text-sm bg-white/10 border border-white/20 hover:bg-white/20 transition">
                        إلغاء
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ── الجزيئات العائمة + شعارات ZET DEV ──────
        (function createWatermarks() {
            const wm = document.getElementById('watermarks');
            for (let i = 0; i < 40; i++) {
                const el = document.createElement('div');
                el.className = 'watermark-logo';
                el.textContent = 'ZET DEV';
                el.style.left = Math.random() * 100 + '%';
                el.style.top = Math.random() * 100 + '%';
                el.style.transform = `rotate(${Math.random() * 360}deg) scale(${0.3 + Math.random() * 0.7})`;
                el.style.animationDuration = (20 + Math.random() * 30) + 's';
                el.style.animationDelay = (Math.random() * 20) + 's';
                wm.appendChild(el);
            }
        })();
        (function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = 2 + Math.random() * 3;
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (10 + Math.random() * 15) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.background = `rgba(96, 165, 250, ${0.2 + Math.random() * 0.4})`;
                p.style.borderRadius = '50%';
                container.appendChild(p);
            }
        })();

        // ── حالة التطبيق ────────────────────────────────
        let eventSource = null;
        let downloading = false;
        let pendingUrl = '';
        let pendingLang = '';

        // ── SSE: تتبع التقدم ────────────────────────────
        function connectSSE() {
            if (eventSource) eventSource.close();
            eventSource = new EventSource('/api/progress');

            eventSource.addEventListener('progress', (e) => {
                const data = JSON.parse(e.data);
                updateProgress(data);
            });

            eventSource.addEventListener('done', (e) => {
                const data = JSON.parse(e.data);
                handleDone(data);
            });

            eventSource.addEventListener('error', (e) => {
                const data = JSON.parse(e.data);
                handleError(data);
            });

            eventSource.addEventListener('info', (e) => {
                const data = JSON.parse(e.data);
                if (data.message === 'NO_SUBTITLE') {
                    showSubtitleModal();
                }
            });

            eventSource.addEventListener('heartbeat', () => {});

            eventSource.onerror = () => {
                // إعادة الاتصال تلقائياً
                setTimeout(connectSSE, 3000);
            };
        }

        // ── تحديث شريط التقدم ────────────────────────────
        function updateProgress(data) {
            document.getElementById('progressCard').classList.remove('hidden');

            // تحديث Stepper
            const steps = document.querySelectorAll('.step');
            steps.forEach((el, i) => {
                el.classList.remove('step-active', 'step-done');
                if (i < data.phase_index) el.classList.add('step-done');
                else if (i === data.phase_index) el.classList.add('step-active');
            });

            // شريط التقدم
            const fill = document.getElementById('progressBarFill');
            fill.style.width = data.overall_percent + '%';

            // النسبة
            document.getElementById('progressPercent').textContent = data.overall_percent + '%';

            // رسالة المرحلة
            document.getElementById('progressMessage').textContent = data.message;

            // السرعة
            if (data.speed) {
                const mb = (data.speed / 1024 / 1024).toFixed(2);
                document.getElementById('progressSpeed').textContent = mb + ' MB/s';
            }

            // الوقت المتبقي
            if (data.eta && data.eta > 0) {
                const m = Math.floor(data.eta / 60);
                const s = data.eta % 60;
                document.getElementById('progressEta').textContent = m + ':' + String(s).padStart(2, '0') + ' متبقي';
            }
        }

        // ── اكتمال التحميل ───────────────────────────────
        function handleDone(data) {
            downloading = false;
            setDownloading(false);

            console.log('SSE done event:', data);

            // إكمال كل الخطوات
            document.querySelectorAll('.step').forEach(el => {
                el.classList.remove('step-active');
                el.classList.add('step-done');
            });

            document.getElementById('progressBarFill').style.width = '100%';
            document.getElementById('progressPercent').textContent = '100%';
            document.getElementById('progressMessage').textContent = 'تم التحميل بنجاح!';

            // عرض النتيجة
            const resultCard = document.getElementById('resultCard');
            const resultContent = document.getElementById('resultContent');
            resultCard.classList.remove('hidden');

            let html = '<div class="text-center">';
            html += '<div class="text-4xl mb-3">✅</div>';
            html += '<h3 class="font-bold text-lg text-green-400 mb-2">تم التحميل بنجاح!</h3>';

            const did = data.result && data.result.download_id;

            if (data.result) {
                if (data.result.title) {
                    html += `<p class="text-white/70 text-sm mb-3">${data.result.title}</p>`;
                }
                if (did) {
                    // أزرار التحميل
                    html += '<div class="flex flex-row gap-2 mt-3">';
                    html += `<a href="/api/download/${did}/video" class="flex-1 flex items-center justify-center gap-2 bg-gradient-to-l from-primary-600 to-accent-600 glow-btn rounded-xl py-3 px-4 font-bold text-sm hover:opacity-90 transition">
                        <span>🎬</span> تحميل الفيديو
                    </a>`;
                    if (data.result.subtitle_requested) {
                        if (data.result.subtitle_file) {
                            const subType = data.result.subtitle_type === 'official' ? 'رسمية' : 'تلقائية';
                            html += `<a href="/api/download/${did}/subtitle" class="flex-1 flex items-center justify-center gap-2 bg-white/10 border border-white/20 rounded-xl py-3 px-4 font-bold text-sm hover:bg-white/20 transition">
                                <span>📝</span> تحميل الترجمة (${subType})
                            </a>`;
                        } else {
                            html += `<div class="flex-1 flex items-center justify-center gap-2 bg-white/5 border border-white/10 rounded-xl py-3 px-4 font-bold text-sm text-white/30 cursor-not-allowed">
                                <span>📝</span> الترجمة غير متاحة
                            </div>`;
                        }
                    }
                    html += '</div>';
                } else {
                    // Fallback: عرض أسماء الملفات القديمة
                    if (data.result.video_file) {
                        const name = data.result.video_file.split('/').pop().split('\\').pop();
                        html += `<div class="flex items-center gap-2 bg-white/5 rounded-lg p-2 mb-2"><span class="text-lg">🎬</span><span class="text-sm text-white/80 truncate">${name}</span></div>`;
                    }
                    if (data.result.subtitle_file) {
                        const name = data.result.subtitle_file.split('/').pop().split('\\').pop();
                        const type = data.result.subtitle_type === 'official' ? 'رسمية' : 'تلقائية';
                        html += `<div class="flex items-center gap-2 bg-white/5 rounded-lg p-2"><span class="text-lg">📝</span><span class="text-sm text-white/80 truncate">${name}</span><span class="text-xs text-accent-400">(${type})</span></div>`;
                    }
                }
            }
            if (data.elapsed) {
                html += `<p class="text-white/40 text-xs mt-3">استغرق: ${data.elapsed} ثانية</p>`;
            }
            html += '</div>';
            resultContent.innerHTML = html;
        }

        // ── خطأ ──────────────────────────────────────────
        function handleError(data) {
            downloading = false;
            setDownloading(false);

            const resultCard = document.getElementById('resultCard');
            const resultContent = document.getElementById('resultContent');
            resultCard.classList.remove('hidden');

            resultContent.innerHTML = `
                <div class="text-center">
                    <div class="text-4xl mb-3">❌</div>
                    <h3 class="font-bold text-lg text-red-400 mb-2">فشل التحميل</h3>
                    <p class="text-white/60 text-sm">${data.message}</p>
                </div>`;
        }

        // ── مودال الترجمة ────────────────────────────────
        function showSubtitleModal() {
            document.getElementById('subtitleModal').classList.remove('hidden');
            document.getElementById('subtitleModal').classList.add('flex');
        }

        function continueWithoutSubtitle() {
            document.getElementById('subtitleModal').classList.add('hidden');
            document.getElementById('subtitleModal').classList.remove('flex');
            // إعادة إرسال طلب التحميل بدون ترجمة
            doDownload(pendingUrl, pendingLang, false);
        }

        function cancelDueToNoSubtitle() {
            document.getElementById('subtitleModal').classList.add('hidden');
            document.getElementById('subtitleModal').classList.remove('flex');
            cancelDownload();
            // إخفاء بطاقة التقدم
            document.getElementById('progressCard').classList.add('hidden');
            downloading = false;
            setDownloading(false);
        }

        // ── تغيير حالة الأزرار ───────────────────────────
        function setDownloading(state) {
            document.getElementById('downloadBtn').disabled = state;
            document.getElementById('infoBtn').disabled = state;
            document.getElementById('cancelBtn').disabled = !state;
        }

        // ── جلب معلومات الفيديو ──────────────────────────
        async function getVideoInfo() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;

            try {
                const resp = await fetch('/api/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url }),
                });
                const data = await resp.json();

                if (!resp.ok) {
                    alert(data.detail || 'خطأ في جلب المعلومات');
                    return;
                }

                const card = document.getElementById('infoCard');
                card.classList.remove('hidden');

                document.getElementById('infoTitle').textContent = data.title;

                if (data.duration) {
                    const m = Math.floor(data.duration / 60);
                    const s = data.duration % 60;
                    document.getElementById('infoDuration').textContent = m + ':' + String(s).padStart(2, '0');
                }

                if (data.thumbnail) {
                    const img = document.getElementById('infoThumb');
                    img.src = data.thumbnail;
                    img.classList.remove('hidden');
                }

                if (data.subtitle_info) {
                    const el = document.getElementById('infoSubtitle');
                    if (data.subtitle_info.available) {
                        el.textContent = '📝 ترجمة ' + (data.subtitle_info.subtitle_type === 'official' ? 'رسمية' : 'تلقائية') + ' متاحة';
                        el.className = 'text-sm mt-1 text-green-400';
                    } else {
                        el.textContent = '⚠️ لا توجد ترجمة عربية';
                        el.className = 'text-sm mt-1 text-yellow-400';
                    }
                }

            } catch (err) {
                alert('خطأ في الاتصال بالخادم');
            }
        }

        // ── بدء التحميل ──────────────────────────────────
        async function startDownload() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) { alert('أدخل رابط يوتيوب'); return; }

            const lang = document.getElementById('langSelect').value;
            const includeSubtitle = document.getElementById('subtitleSelect').value === 'yes';
            const cookiefile = document.getElementById('cookieInput').value.trim() || null;
            const proxy = document.getElementById('proxyInput').value.trim() || null;

            pendingUrl = url;
            pendingLang = lang;

            doDownload(url, lang, includeSubtitle, cookiefile, proxy);
        }

        async function doDownload(url, lang, includeSubtitle, cookiefile, proxy) {
            // إعادة تعيين الواجهة
            document.getElementById('resultCard').classList.add('hidden');
            document.getElementById('progressCard').classList.remove('hidden');
            document.getElementById('progressBarFill').style.width = '0%';
            document.getElementById('progressPercent').textContent = '0%';
            document.getElementById('progressSpeed').textContent = '';
            document.getElementById('progressEta').textContent = '';
            document.getElementById('progressMessage').textContent = 'جاري البدء...';
            document.querySelectorAll('.step').forEach(el => el.classList.remove('step-active', 'step-done'));
            document.querySelector('.step[data-step="0"]').classList.add('step-active');

            downloading = true;
            setDownloading(true);

            // الاتصال بـ SSE أولاً
            connectSSE();

            try {
                const resp = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url,
                        lang,
                        include_subtitle: includeSubtitle,
                        cookiefile,
                        proxy,
                    }),
                });

                if (!resp.ok) {
                    const data = await resp.json();
                    handleError({ message: data.detail || 'خطأ غير معروف' });
                }
            } catch (err) {
                handleError({ message: 'خطأ في الاتصال بالخادم' });
            }
        }

        // ── إلغاء التحميل ────────────────────────────────
        async function cancelDownload() {
            try {
                await fetch('/api/cancel', { method: 'POST' });
            } catch (err) {}
        }

        // ── اختصار لوحة المفاتيح ─────────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.activeElement.id === 'urlInput') {
                startDownload();
            }
        });
    </script>
</body>
</html>
